<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SOT: Extraction &amp; Review</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <h1>SOT: Extraction &amp; Review</h1>
      </header>

      <main class="layout">
        <div class="layout-top">
          <section class="panel panel-form">
            <div class="section-head">
              <h2 id="formPanelTitle">New Extraction</h2>
              <span id="batchBadge" class="badge">Idle</span>
            </div>

            <div class="tab-bar" role="tablist">
              <button id="tabExtraction" class="tab-button active" role="tab" aria-selected="true">Extraction</button>
              <button id="tabReview" class="tab-button" role="tab" aria-selected="false">Review</button>
            </div>

            <div id="extractionTab" class="tab-pane">

            <label class="field file-field">
              <span>Source doc</span>
              <input id="documentFiles" type="file" multiple accept=".pdf,.docx">
            </label>

            <label class="field file-field">
              <span>Source URLs</span>
              <textarea id="sourceUrls" rows="3"></textarea>
            </label>

            <label class="field file-field">
              <span>Sample CSV</span>
              <input id="sampleCsvFile" type="file" accept=".csv">
            </label>

            <label class="field">
              <span>Sample Instructions <em>(optional)</em></span>
              <textarea
                id="instructions"
                rows="4"
                placeholder="Optional: describe the target CSV columns or any extraction rules. Leave blank to use the default schema."
              ></textarea>
            </label>

            <div class="button-row">
              <button id="generateDraftButton" class="primary">Generate sample</button>
              <button id="approveDraftButton" class="accent" hidden>Approve sample</button>
              <button id="runExtractionButton">Extract</button>
            </div>
            </div>

            <div id="reviewTab" class="tab-pane" hidden>
              <div class="review-mode-toggle" role="tablist">
                <button id="reviewModeBatch" class="tab-button active" role="tab" aria-selected="true">In-app CSV</button>
                <button id="reviewModeExternal" class="tab-button" role="tab" aria-selected="false">External CSV</button>
              </div>

              <div id="reviewBatchMode">
                <label class="field">
                  <span>Extracted subject</span>
                  <select id="reviewBatchSelect" class="select-input"><option value="">Loading…</option></select>
                </label>
              </div>

              <div id="reviewExternalMode" hidden>
                <label class="field file-field">
                  <span>CSV to review</span>
                  <input id="reviewCsvFile" type="file" accept=".csv">
                </label>

                <label class="field file-field">
                  <span>Source document</span>
                  <input id="reviewSourceFile" type="file" accept=".pdf,.docx">
                </label>

                <label class="field">
                  <span>Source URL</span>
                  <textarea id="reviewSourceUrl" rows="2"></textarea>
                </label>
              </div>

              <label class="field">
                <span>Instructions before review</span>
                <textarea id="reviewInstructions" rows="2"></textarea>
              </label>

              <div class="button-row">
                <button id="reviewCsvButton" class="primary">Review</button>
              </div>

              <label class="field">
                <span>Suggested improvements</span>
                <textarea id="reviewSuggestions" rows="2"></textarea>
              </label>

              <div id="reviewSummary" class="result-summary"></div>
              <div id="reviewFindings" class="review-findings"></div>

              <div id="reviewFixRow" class="button-row" hidden>
                <button id="approveFixButton" class="accent">Approve &amp; fix</button>
                <button id="downloadFixedButton" class="ghost" hidden>Download Fixed CSV</button>
              </div>
              <div id="reviewFixSummary" class="result-summary" hidden></div>
            </div>
          </section>

          <section class="panel panel-preview">
            <div class="section-head sample-preview-panel-head">
              <h2 id="previewHeading">Preview</h2>
            </div>
            <div class="sample-preview-card">
              <div class="sheet-preview-shell">
                <div class="sheet-formula-bar">
                  <div id="samplePreviewCellRef" class="sheet-cell-ref">A1</div>
                  <div class="sheet-fx">fx</div>
                  <div id="samplePreviewFormula" class="sheet-formula-value"></div>
                </div>
                <div id="samplePreviewTableWrap" class="sheet-grid empty-state"></div>
              </div>
            </div>
            <div class="button-row preview-action-row">
              <button id="downloadFinalButton" class="accent" disabled>Download CSV</button>
            </div>
            <div id="resultSummary" class="result-summary">No results yet. Run an extraction to see output here.</div>
            <div id="actionBox" class="action-status"></div>
            <pre id="statusBox" class="status-inline">Waiting for a batch.</pre>
          </section>
        </div>

      </main>

      <div class="hidden-support">
        <textarea id="sampleCsvEditor" rows="12"></textarea>
        <code id="samplePathBox"></code>
        <code id="schemaPathBox"></code>
      </div>
    </div>

    <script src="/app.js" defer></script>
  </body>
  </html>
